<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INREALLIFE // NEO-GEO UPLINK</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neo-blue: #0056b3;
            --neo-yellow: #facc15;
            --neo-red: #ef4444;
            --neo-green: #39ff14;
            --neo-magenta: #ff00ff;
            
            /* Dark Mode Defaults */
            --bg-color: #0a0a0a;
            --text-color: #39ff14;
            --box-bg: rgba(0, 0, 0, 0.9);
            --grid-opacity: 0.1;
        }

        /* Light Mode / Service Mode */
        body.light-mode {
            --bg-color: #e5e7eb; 
            --text-color: #1e3a8a; 
            --box-bg: rgba(255, 255, 255, 0.95);
            --grid-opacity: 0.2;
            --neo-green: #1e40af; 
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(57, 255, 20, var(--grid-opacity)) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            font-family: 'Courier Prime', monospace;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .neo-box {
            border: 4px solid var(--text-color);
            box-shadow: 6px 6px 0px 0px rgba(0, 0, 0, 0.2);
            background: var(--box-bg);
            transition: border-color 0.3s, background 0.3s;
        }

        .pixel-btn {
            border: 2px solid var(--text-color);
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            transition: all 0.1s;
            cursor: pointer;
            position: relative;
            background: transparent;
            color: var(--text-color);
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .pixel-btn:hover:not(:disabled) {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .animate-blink { animation: blink 1s infinite; }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        .kof-header {
            font-family: 'Press Start 2P', cursive;
            color: var(--neo-yellow);
            text-shadow: 4px 4px var(--neo-red);
        }

        .theme-toggle-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 10000;
        }

        .stats-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
        }

        /* Custom Colors for KOF buttons */
        .btn-green { background-color: #15803d; color: white; border-color: #22c55e; }
        .btn-red { background-color: #b91c1c; color: white; border-color: #ef4444; }
        .btn-purple { background-color: #7e22ce; color: white; border-color: #a855f7; }
        .btn-yellow { background-color: #a16207; color: white; border-color: #eab308; }
        .btn-white { background-color: #f3f4f6; color: #111827; border-color: #9ca3af; }
        .btn-blue { background-color: #1e3a8a; color: white; border-color: #3b82f6; }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            border: 4px solid var(--text-color);
        }

        .video-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        .active-glow {
            box-shadow: inset 0 0 40px rgba(57, 255, 20, 0.15), 0 0 20px rgba(57, 255, 20, 0.1);
        }

        /* Archive Grid Styles */
        .archive-item {
            position: relative;
            background: #000;
            border: 2px solid var(--text-color);
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        .archive-item img, .archive-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.2s;
        }
        .archive-item:hover img, .archive-item:hover video {
            filter: grayscale(0%);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanlines"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [theme, setTheme] = useState('dark');
            const [view, setView] = useState('auth');
            const [isBooting, setIsBooting] = useState(false);
            const [bootProgress, setBootProgress] = useState(0);
            const [statusMsg, setStatusMsg] = useState('IDLE');
            const [lensSynced, setLensSynced] = useState(false);
            const [streamActive, setStreamActive] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [recordTime, setRecordTime] = useState(5);
            const [archive, setArchive] = useState([]);
            const [viewers, setViewers] = useState(0);
            
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const chunksRef = useRef([]);

            const toggleTheme = () => {
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
                if (newTheme === 'light') {
                    document.body.classList.add('light-mode');
                } else {
                    document.body.classList.remove('light-mode');
                }
            };

            const handleBoot = () => {
                setIsBooting(true);
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 25;
                    if (progress >= 100) {
                        setBootProgress(100);
                        clearInterval(interval);
                        setTimeout(() => {
                            setView('discover');
                            setIsBooting(false);
                        }, 600);
                    }
                    setBootProgress(Math.min(progress, 100));
                }, 100);
            };

            const syncLens = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    streamRef.current = stream;
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        setLensSynced(true);
                        setStatusMsg('LENS_LOCKED');
                    }
                } catch (err) {
                    setStatusMsg('SIGNAL_ERROR');
                }
            };

            const goLive = () => {
                if (!lensSynced) return;
                setStreamActive(true);
                setStatusMsg('BROADCASTING');
                setViewers(Math.floor(Math.random() * 150) + 50);
            };

            const stopAll = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
                if (videoRef.current) {
                    videoRef.current.srcObject = null;
                }
                setStreamActive(false);
                setLensSynced(false);
                setIsRecording(false);
                setStatusMsg('SIGNAL_TERMINATED');
                setViewers(0);
            };

            const endLiveOnly = () => {
                setStreamActive(false);
                setStatusMsg('LENS_LOCKED');
                setViewers(0);
            };

            const start5SecRecord = () => {
                if (!lensSynced || isRecording) return;
                
                setIsRecording(true);
                setRecordTime(5);
                setStatusMsg('BUFFERING_VIDEO');
                chunksRef.current = [];

                const recorder = new MediaRecorder(streamRef.current);
                mediaRecorderRef.current = recorder;

                recorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunksRef.current.push(e.data);
                };

                recorder.onstop = () => {
                    const blob = new Blob(chunksRef.current, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    setArchive(prev => [{ id: Date.now(), url, type: 'video' }, ...prev]);
                    setIsRecording(false);
                    setStatusMsg(streamActive ? 'BROADCASTING' : 'LENS_LOCKED');
                };

                recorder.start();

                const timer = setInterval(() => {
                    setRecordTime(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            recorder.stop();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            const takeSnapshot = () => {
                if (!lensSynced || !videoRef.current) return;
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1); 
                ctx.drawImage(videoRef.current, 0, 0);
                const url = canvas.toDataURL('image/png');
                setArchive(prev => [{ id: Date.now(), url, type: 'image' }, ...prev]);
                setStatusMsg('CAP_SAVED');
                setTimeout(() => setStatusMsg(streamActive ? 'BROADCASTING' : 'LENS_LOCKED'), 1000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 crt-flicker">
                    <div className="theme-toggle-container">
                        <button onClick={toggleTheme} className="pixel-btn p-2 text-[8px]">
                            {theme === 'dark' ? 'SERVICE_MODE' : 'ARCADE_MODE'}
                        </button>
                    </div>

                    {view !== 'auth' && (
                        <div className="flex flex-wrap gap-4 mb-8 neo-box p-4 items-center justify-between border-b-8">
                            <div className="flex gap-4">
                                <button onClick={() => setView('discover')} className={`pixel-btn p-2 text-[10px] ${view === 'discover' ? 'bg-current !text-inherit' : ''}`} style={{color: view === 'discover' ? 'var(--bg-color)' : 'var(--text-color)', backgroundColor: view === 'discover' ? 'var(--text-color)' : 'transparent'}}>DISCOVER</button>
                                <button onClick={() => setView('channel')} className={`pixel-btn p-2 text-[10px] ${view === 'channel' ? 'bg-current !text-inherit' : ''}`} style={{color: view === 'channel' ? 'var(--bg-color)' : 'var(--text-color)', backgroundColor: view === 'channel' ? 'var(--text-color)' : 'transparent'}}>MY CHANNEL</button>
                                <button onClick={() => setView('profile')} className={`pixel-btn p-2 text-[10px] ${view === 'profile' ? 'bg-current !text-inherit' : ''}`} style={{color: view === 'profile' ? 'var(--bg-color)' : 'var(--text-color)', backgroundColor: view === 'profile' ? 'var(--text-color)' : 'transparent'}}>MY ARCHIVE</button>
                            </div>
                            <button onClick={() => window.location.reload()} className="pixel-btn p-2 text-[10px] bg-red-600 text-white border-red-900 hover:bg-red-500">LOGOUT</button>
                        </div>
                    )}

                    {view === 'auth' && (
                        <div className="max-w-2xl mx-auto mt-20 text-center">
                            <h1 className="kof-header text-5xl mb-4 italic">INREALLIFE</h1>
                            <div className="neo-box p-8 text-left space-y-4">
                                <p className="text-xl">NO COOKIES. NO MASTERS.</p>
                                <p className="opacity-70">UPLINK_STATUS: {isBooting ? 'CONNECTING...' : 'READY'}</p>
                                {isBooting ? (
                                    <div className="w-full bg-zinc-800 h-8 border-2 border-current">
                                        <div className="h-full" style={{ width: `${bootProgress}%`, backgroundColor: 'var(--text-color)' }}></div>
                                    </div>
                                ) : (
                                    <button onClick={handleBoot} className="pixel-btn w-full p-4 text-xl bg-current !text-inherit" style={{backgroundColor: 'var(--text-color)', color: 'var(--bg-color)'}}>
                                        START BROADCAST
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {view === 'discover' && (
                        <div className="max-w-4xl mx-auto">
                            <h2 className="kof-header text-2xl mb-6 underline">WORLD_UPLINKS</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {[1, 2, 3, 4].map(i => (
                                    <div key={i} className="neo-box p-2 group overflow-hidden">
                                        <div className="bg-zinc-900 aspect-video mb-2 flex items-center justify-center border-2 border-zinc-800">
                                            <span className="text-zinc-700 font-bold italic">SIGNAL_LOST_{i}</span>
                                        </div>
                                        <div className="flex justify-between items-center px-2">
                                            <span className="text-xs">UPLINK_0{i}</span>
                                            <span className="text-[10px] text-red-500 font-bold animate-pulse">● LIVE</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'channel' && (
                        <div className="max-w-6xl mx-auto">
                            <div className="flex flex-col lg:flex-row gap-6">
                                <div className="flex-1">
                                    <h2 className="kof-header text-2xl mb-4">MY_CHANNEL_01</h2>
                                    <div className={`video-container ${lensSynced ? 'active-glow' : ''}`}>
                                        <video ref={videoRef} autoPlay playsInline muted className="video-feed" />
                                        
                                        <div className="absolute top-6 left-6 pointer-events-none stats-text">
                                            {streamActive && <div className="text-red-500 animate-pulse text-lg mb-2">● LIVE</div>}
                                            {isRecording && (
                                                <div className="text-white bg-red-600 px-2 py-1 text-[10px] inline-flex items-center gap-2 mb-2">
                                                    <span className="animate-pulse">REC</span>
                                                    <span>0:0{recordTime}</span>
                                                </div>
                                            )}
                                            <div className="text-white text-[10px] bg-black/60 p-2 backdrop-blur-sm border-l-2 border-current">
                                                STATUS: {lensSynced ? (streamActive ? 'BROADCASTING' : 'LENS_ACTIVE') : 'OFFLINE'}
                                            </div>
                                        </div>

                                        <div className="absolute inset-0 pointer-events-none border-[12px] border-black/10"></div>
                                        {!lensSynced && (
                                            <div className="absolute inset-0 flex items-center justify-center bg-zinc-900/80">
                                                <div className="stats-text text-zinc-500 animate-pulse uppercase">Waiting for lens sync...</div>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="mt-6 grid grid-cols-2 md:grid-cols-5 gap-3">
                                        {!lensSynced ? (
                                            <button onClick={syncLens} className="pixel-btn p-4 text-[9px] btn-blue">SYNC LENS</button>
                                        ) : (
                                            <button onClick={stopAll} className="pixel-btn p-4 text-[9px] btn-white">CUT ALL</button>
                                        )}

                                        {streamActive ? (
                                            <button onClick={endLiveOnly} className="pixel-btn p-4 text-[9px] btn-white">END LIVE</button>
                                        ) : (
                                            <button 
                                                onClick={goLive} 
                                                disabled={!lensSynced}
                                                className={`pixel-btn p-4 text-[9px] btn-green ${!lensSynced ? 'opacity-40 grayscale cursor-not-allowed' : ''}`}
                                            >GO LIVE</button>
                                        )}

                                        <button 
                                            onClick={start5SecRecord}
                                            disabled={!lensSynced || isRecording}
                                            className={`pixel-btn p-4 text-[9px] btn-red ${(!lensSynced || isRecording) ? 'opacity-40 grayscale cursor-not-allowed' : ''}`}
                                        >
                                            {isRecording ? 'SAVING...' : 'RECORD'}
                                        </button>

                                        <button 
                                            onClick={takeSnapshot} 
                                            disabled={!lensSynced}
                                            className={`pixel-btn p-4 text-[9px] btn-yellow ${!lensSynced ? 'opacity-40 grayscale cursor-not-allowed' : ''}`}
                                        >CAPTURE</button>

                                        <button className="pixel-btn p-4 text-[9px] btn-purple">DONATE</button>
                                    </div>
                                </div>

                                <div className="w-full lg:w-72 space-y-4">
                                    <div className="neo-box p-4">
                                        <h3 className="stats-text text-white mb-4 border-b border-current pb-2">CHANNEL_STATS</h3>
                                        <div className="space-y-4">
                                            <div>
                                                <div className="text-[10px] opacity-60">VIEWERS</div>
                                                <div className="stats-text text-xl text-[#facc15]">{streamActive ? viewers : '---'}</div>
                                            </div>
                                            <div>
                                                <div className="text-[10px] opacity-60">BITRATE</div>
                                                <div className="stats-text text-sm text-[#39ff14]">{lensSynced ? (isRecording || streamActive ? '4500 KBPS' : 'IDLE') : 'OFFLINE'}</div>
                                            </div>
                                            <div>
                                                <div className="text-[10px] opacity-60">LATENCY</div>
                                                <div className="stats-text text-sm text-[#ef4444]">{streamActive ? '12ms' : '---'}</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="neo-box p-4 stats-text text-[8px] leading-relaxed bg-black/40">
                                        <div className="text-[#39ff14] mb-1">SYSTEM_LOG:</div>
                                        <div>> UPLINK STATUS: {statusMsg}</div>
                                        <div>> LENS SYNC: {lensSynced ? 'YES' : 'NO'}</div>
                                        <div>> SECURITY: ENCRYPTED</div>
                                        {isRecording && <div className="text-red-500 animate-pulse mt-2">> WRITING 5s BLOB...</div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'profile' && (
                        <div className="max-w-4xl mx-auto">
                            <h2 className="kof-header text-2xl mb-6">SAVED_DATA</h2>
                            {archive.length === 0 ? (
                                <div className="neo-box p-20 text-center opacity-50 uppercase">Empty Archive</div>
                            ) : (
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {archive.map(item => (
                                        <div key={item.id} className="archive-item neo-box">
                                            {item.type === 'image' ? (
                                                <img src={item.url} alt="Capture" />
                                            ) : (
                                                <video src={item.url} controls muted loop />
                                            )}
                                            <div className="absolute bottom-0 left-0 right-0 bg-black/80 text-[6px] p-1 stats-text text-center border-t border-current">
                                                {item.type.toUpperCase()} // {new Date(item.id).toLocaleTimeString()}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    <div className="fixed bottom-4 left-4 text-[8px] opacity-40">
                        INREALLIFE // UPLINK_STABLE // 2026
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
