<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>irl.tv // Discovery</title>
<style>
:root {
--red: #FF3131;
--blue: #0047AB;
--green: #39FF14;
--yellow: #FAFF00;
--purple: #BC13FE;
--black: #000000;
--white: #FFFFFF;
--border-width: 4px;
}

* { box-sizing: border-box; cursor: default; }
body {
background-color: #e0e0e0;
background-image: radial-gradient(var(--black) 1px, transparent 0);
background-size: 20px 20px;
font-family: "Courier New", Courier, monospace;
margin: 0; padding: 15px; color: var(--black);
}

.bold-border { border: var(--border-width) solid var(--black); }
.shadow { box-shadow: 6px 6px 0px var(--black); }
.bg-red { background-color: var(--red); color: white; }
.bg-blue { background-color: var(--blue); color: white; }
.bg-green { background-color: var(--green); }
.bg-yellow { background-color: var(--yellow); }

header { text-align: center; margin-bottom: 20px; }
.logo-container {
display: inline-block; width: 100%; max-width: 800px; height: 50px;
overflow: hidden; border: var(--border-width) solid var(--black);
background-color: var(--red); box-shadow: 6px 6px 0px var(--black);
transform: skew(-5deg); position: relative;
}

.ticker-col { display: flex; flex-direction: column; animation: ticker-vertical 12s linear infinite; }
.ticker-item { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: white; text-transform: uppercase; }
@keyframes ticker-vertical { 0% { transform: translateY(0); } 100% { transform: translateY(-250px); } }

nav { margin-top: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
nav button {
background: var(--white); border: var(--border-width) solid var(--black);
cursor: pointer; font-weight: bold; padding: 8px 15px; font-size: 0.8rem;
box-shadow: 4px 4px 0px var(--black); text-transform: uppercase;
}
nav button.active { background: var(--black); color: var(--white); }

.container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 25px; }
@media (min-width: 900px) { .container { grid-template-columns: 350px 1fr; } }

.box { background-color: var(--white); margin-bottom: 15px; overflow: hidden; }
.box-header { padding: 8px 12px; font-size: 0.85rem; font-weight: 900; text-transform: uppercase; border-bottom: var(--border-width) solid var(--black); }
.box-content { padding: 12px; font-size: 0.85rem; }

.feed-container { display: flex; flex-direction: column; gap: 30px; }
.video-card { position: relative; width: 100%; background: #000; border: var(--border-width) solid var(--black); box-shadow: 8px 8px 0px var(--black); }
.video-aspect { position: relative; padding-bottom: 125%; height: 0; background: #050505; overflow: hidden; }

.sim-placeholder {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
display: flex; flex-direction: column; align-items: center; justify-content: center;
background: repeating-radial-gradient(circle at center, #111, #000 20%);
}
.sim-visual {
width: 120px; height: 120px; border: 4px solid var(--green);
position: relative; animation: pulse 2s infinite ease-in-out;
}

.video-overlay {
position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px;
background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: white;
pointer-events: none;
}
.creator-tag { font-weight: 900; font-size: 1.2rem; color: var(--green); display: flex; align-items: center; gap: 5px; }

.action-bar { position: absolute; right: 10px; bottom: 80px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
.action-btn {
width: 50px; height: 50px; border-radius: 50%; border: 3px solid white;
background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column;
align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold;
cursor: pointer; pointer-events: auto;
}

.algorithm-label {
position: absolute; top: 15px; left: 15px; padding: 5px 10px; font-size: 0.65rem;
font-weight: 900; text-transform: uppercase; background: var(--yellow); border: 2px solid black; color: black; z-index: 10;
}

@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }
</style>
</head>
<body>

<header>
<div class="logo-container">
<div class="ticker-col">
<div class="ticker-item">LIVE DISCOVERY // NO ALGORITHMIC BIAS</div>
<div class="ticker-item">CLOUT REWARDS THE COMMUNITY</div>
<div class="ticker-item">EVERYONE HAS A SHOT AT VIRALITY</div>
</div>
</div>
<nav id="mainNav">
<button onclick="showPage('watchView')" class="bg-green active">DISCOVER</button>
<button onclick="showPage('profileView')">MY CHANNEL</button>
<button onclick="showPage('myProfileView')" class="bg-blue" style="color:white;">PROFILE</button>
</nav>
</header>

<div id="watchView" class="container page-section">
<aside>
<div class="box bold-border shadow">
<div class="box-header bg-yellow">📈 VIRAL VELOCITY</div>
<div class="box-content">
<div style="font-size: 0.7rem;">
<b>Current Mode:</b> <span style="color:var(--red)">UNDERDOG BOOST</span><br>
<b>Total Clout:</b> <span id="totalCloutDisplay">...</span><br>
<hr style="border:1px dashed #ccc">
<p id="cloud-status" style="font-size: 10px; color: #666;">Connecting to Grid...</p>
</div>
</div>
</div>
<div class="box bold-border shadow">
<div class="box-header bg-black" style="color:white">LIVE NOW</div>
<div id="sidebarList" style="max-height: 400px; overflow-y: auto;"></div>
</div>
</aside>
<main class="feed-container" id="discoveryFeed"></main>
</div>

<div id="myProfileView" class="container page-section" style="display:none;">
<main style="grid-column: 1 / -1;">
<div class="box bold-border shadow">
<div class="box-header bg-blue" style="color:white;">USER_PROFILE</div>
<div class="box-content">
<p>Clout Earned: <span id="userClout" style="font-weight:bold;">0</span></p>
<textarea id="bioTextArea" style="width:100%; height:100px; border:2px solid black; margin-top:10px;" placeholder="Update your Bio..."></textarea>
<button onclick="updateBio()" class="bg-green bold-border shadow" style="padding:10px 20px; margin-top:10px;">SAVE_MANIFESTO</button>
</div>
</div>
</main>
</div>

<!-- Firebase Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

// CONFIGURATION: Replace with the values from your Firebase Console
const firebaseConfig = {
apiKey: "PASTE_YOUR_API_KEY_HERE",
authDomain: "inreallife-tv.firebaseapp.com",
projectId: "inreallife-tv",
storageBucket: "inreallife-tv.firebasestorage.app",
messagingSenderId: "369986385311",
appId: "1:369986385311:web:5488427f7178a9c5132205"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = "inreallife-tv";

let currentUser = null;
let globalCreators = [];

signInAnonymously(auth).catch(err => console.error("Auth Error:", err));

onAuthStateChanged(auth, (user) => {
if (user) {
currentUser = user;
document.getElementById('cloud-status').innerText = "SYSTEMS ONLINE // CLOUD SYNCED";
syncUserData();
listenToCreators();
}
});

async function syncUserData() {
if (!currentUser) return;
const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
try {
const snap = await getDoc(userRef);
if (snap.exists()) {
document.getElementById('bioTextArea').value = snap.data().bio || "";
document.getElementById('userClout').innerText = snap.data().clout || 0;
} else {
await setDoc(userRef, { bio: "", clout: 0 });
}
} catch (e) { console.error("Sync Error:", e); }
}

window.updateBio = async () => {
if (!currentUser) return;
const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
await updateDoc(userRef, { bio: document.getElementById('bioTextArea').value });
alert("MANIFESTO UPDATED.");
}

function listenToCreators() {
const creatorsCol = collection(db, 'artifacts', appId, 'public', 'data', 'creators');
onSnapshot(creatorsCol, (snapshot) => {
const creators = [];
snapshot.forEach(doc => creators.push({ id: doc.id, ...doc.data() }));

if (creators.length === 0) seedDatabase();

globalCreators = creators;
renderFeed();

const total = creators.reduce((acc, curr) => acc + (curr.clout || 0), 0);
document.getElementById('totalCloutDisplay').innerText = total;
}, (error) => {
console.error("Firestore Listen Error:", error);
});
}

async function seedDatabase() {
const initials = [
{ name: "DataDrifter", clout: 15400, type: "Authority", likes: 2400, desc: "Late night synth sessions." },
{ name: "NeonUnderdog", clout: 45, type: "Underdog", likes: 8, desc: "Basement testing." }
];
for (let c of initials) {
await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'creators', c.name), c);
}
}

window.showPage = (id) => {
document.querySelectorAll('.page-section').forEach(p => p.style.display = 'none');
document.getElementById(id).style.display = 'grid';

document.querySelectorAll('#mainNav button').forEach(btn => btn.classList.remove('active'));
const activeBtn = Array.from(document.querySelectorAll('#mainNav button')).find(btn => btn.innerText.toLowerCase().includes(id.replace('View','').toLowerCase()));
if (activeBtn) activeBtn.classList.add('active');
};

window.renderFeed = () => {
const feed = document.getElementById('discoveryFeed');
const sidebar = document.getElementById('sidebarList');
if (!feed || !sidebar) return;

feed.innerHTML = '';
sidebar.innerHTML = '';

globalCreators.sort((a,b) => b.clout - a.clout).forEach(c => {
const sItem = document.createElement('div');
sItem.style = "padding:10px; border-bottom:1px solid #eee; font-size:0.7rem;";
sItem.innerHTML = `<b>@${c.name}</b>: ${c.clout} CLOUT`;
sidebar.appendChild(sItem);

const card = document.createElement('div');
card.className = "video-card";
card.innerHTML = `
<div class="algorithm-label">${c.type}</div>
<div class="video-aspect"><div class="sim-placeholder"><div class="sim-visual"></div></div></div>
<div class="action-bar">
<div class="action-btn" onclick="likeCreator('${c.id}')">❤️<br><span class="count">${c.likes || 0}</span></div>
</div>
<div class="video-overlay">
<div class="creator-tag">@${c.name}</div>
<div style="font-size:0.8rem; opacity:0.9">${c.desc}</div>
</div>
`;
feed.appendChild(card);
});
};

window.likeCreator = async (id) => {
if (!currentUser) return;
const cRef = doc(db, 'artifacts', appId, 'public', 'data', 'creators', id);
await updateDoc(cRef, { likes: increment(1), clout: increment(25) });
const uRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'data');
await updateDoc(uRef, { clout: increment(1) });
syncUserData();
};

</script>
</body>
</html>
