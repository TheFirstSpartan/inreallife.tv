<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INREALLIFE // NEO-GEO UPLINK</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neo-blue: #0056b3;
            --neo-yellow: #facc15;
            --neo-red: #ef4444;
            --neo-green: #39ff14;
            --neo-magenta: #ff00ff;
        }

        body {
            background-color: #0a0a0a;
            background-image: radial-gradient(rgba(57, 255, 20, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--neo-green);
            font-family: 'Courier Prime', monospace;
            overflow-x: hidden;
        }

        .neo-box {
            border: 4px solid #39ff14;
            box-shadow: 6px 6px 0px 0px rgba(57, 255, 20, 0.3);
            background: rgba(0, 0, 0, 0.9);
        }

        .pixel-btn {
            border: 2px solid #39ff14;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            transition: all 0.1s;
            cursor: pointer;
            position: relative;
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .pixel-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .animate-blink { animation: blink 1s infinite; }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .kof-header {
            font-family: 'Press Start 2P', cursive;
            color: var(--neo-yellow);
            text-shadow: 4px 4px var(--neo-red);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="scanlines"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [view, setView] = useState('auth');
            const [isBooting, setIsBooting] = useState(false);
            const [bootProgress, setBootProgress] = useState(0);
            const [statusMsg, setStatusMsg] = useState('SYSTEM_IDLE');
            const [streamActive, setStreamActive] = useState(false);
            const [archive, setArchive] = useState([]);
            const videoRef = useRef(null);

            const handleBoot = () => {
                setIsBooting(true);
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 20;
                    if (progress >= 100) {
                        setBootProgress(100);
                        clearInterval(interval);
                        setTimeout(() => {
                            setView('discover');
                            setIsBooting(false);
                        }, 800);
                    }
                    setBootProgress(Math.min(progress, 100));
                }, 150);
            };

            const initCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        setStreamActive(true);
                        setStatusMsg('LENS_SYNCED');
                    }
                } catch (err) {
                    setStatusMsg('SIGNAL_BLOCKED');
                }
            };

            const takeSnapshot = () => {
                if (!streamActive || !videoRef.current) return;
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(videoRef.current, 0, 0);
                const url = canvas.toDataURL('image/png');
                setArchive(prev => [{ id: Date.now(), url, type: 'image' }, ...prev]);
                setStatusMsg('DATA_CACHED');
            };

            return (
                <div className="min-h-screen p-4 md:p-8 crt-flicker">
                    {/* TOP NAVIGATION */}
                    {view !== 'auth' && (
                        <div className="flex flex-wrap gap-4 mb-8 neo-box p-4 items-center justify-between border-b-8">
                            <div className="flex gap-4">
                                <button onClick={() => setView('discover')} className={`pixel-btn p-2 text-[10px] ${view === 'discover' ? 'bg-[#39ff14] text-black' : 'text-[#39ff14]'}`}>DISCOVER</button>
                                <button onClick={() => setView('channel')} className={`pixel-btn p-2 text-[10px] ${view === 'channel' ? 'bg-[#39ff14] text-black' : 'text-[#39ff14]'}`}>LIVE UPLINK</button>
                                <button onClick={() => setView('profile')} className={`pixel-btn p-2 text-[10px] ${view === 'profile' ? 'bg-[#39ff14] text-black' : 'text-[#39ff14]'}`}>MY ARCHIVE</button>
                            </div>
                            <button onClick={() => window.location.reload()} className="pixel-btn p-2 text-[10px] bg-red-600 text-white border-red-900">LOGOUT</button>
                        </div>
                    )}

                    {/* VIEW: AUTH / BOOT */}
                    {view === 'auth' && (
                        <div className="max-w-2xl mx-auto mt-20 text-center">
                            <h1 className="kof-header text-5xl mb-4 italic">INREALLIFE</h1>
                            <div className="neo-box p-8 text-left space-y-4">
                                <p className="text-xl">NO COOKIES. NO MASTERS.</p>
                                <p className="opacity-70">DISK_DRIVE_A: {isBooting ? 'SEARCHING...' : 'READY'}</p>
                                
                                {isBooting ? (
                                    <div className="w-full bg-gray-900 h-8 border-2 border-[#39ff14]">
                                        <div 
                                            className="bg-[#39ff14] h-full transition-all duration-100" 
                                            style={{ width: `${bootProgress}%` }}
                                        ></div>
                                    </div>
                                ) : (
                                    <button 
                                        onClick={handleBoot}
                                        className="pixel-btn w-full p-4 text-xl bg-[#39ff14] text-black hover:bg-white"
                                    >
                                        INSERT DISK (START)
                                    </button>
                                )}
                                <p className="text-[10px] animate-blink mt-4">>> PRESS ANY KEY TO INTERRUPT</p>
                            </div>
                        </div>
                    )}

                    {/* VIEW: DISCOVER */}
                    {view === 'discover' && (
                        <div className="max-w-4xl mx-auto">
                            <h2 className="kof-header text-2xl mb-6 underline">GLOBAL_FEED</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {[1, 2, 3, 4].map(i => (
                                    <div key={i} className="neo-box p-2 group overflow-hidden">
                                        <div className="bg-zinc-900 aspect-video mb-2 flex items-center justify-center border-2 border-zinc-800">
                                            <span className="text-zinc-700 font-bold italic">NO_SIGNAL_{i}</span>
                                        </div>
                                        <div className="flex justify-between items-center px-2">
                                            <span className="text-xs">USER_ID: 0x{i}F42</span>
                                            <span className="text-[10px] text-red-500">● LIVE</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* VIEW: CHANNEL / CAMERA */}
                    {view === 'channel' && (
                        <div className="max-w-4xl mx-auto">
                            <h2 className="kof-header text-2xl mb-6">UPLINK_TERMINAL</h2>
                            <div className="neo-box p-4 bg-black relative">
                                <video 
                                    ref={videoRef} 
                                    autoPlay 
                                    playsInline 
                                    muted
                                    className="w-full aspect-video bg-zinc-900 mb-4 border-2 border-[#39ff14]"
                                />
                                <div className="absolute top-8 left-8 pointer-events-none">
                                    <div className="text-red-500 font-bold animate-pulse text-xl">REC</div>
                                    <div className="text-[10px]">TIMESTAMP: {new Date().toLocaleTimeString()}</div>
                                </div>
                                
                                <div className="flex flex-wrap gap-4 justify-center">
                                    <button onClick={initCamera} disabled={streamActive} className="pixel-btn p-3 bg-blue-900 text-white">SYNC LENS</button>
                                    <button onClick={takeSnapshot} className="pixel-btn p-3 bg-yellow-600 text-black">SNAP</button>
                                    <div className="neo-box px-4 py-2 flex items-center text-xs font-bold text-[#39ff14]">
                                        STATUS: {statusMsg}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VIEW: ARCHIVE */}
                    {view === 'profile' && (
                        <div className="max-w-4xl mx-auto">
                            <h2 className="kof-header text-2xl mb-6">LOCAL_STASH</h2>
                            {archive.length === 0 ? (
                                <div className="neo-box p-20 text-center opacity-50">
                                    [ ARCHIVE_EMPTY ]
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {archive.map(item => (
                                        <div key={item.id} className="neo-box p-1">
                                            <img src={item.url} className="w-full grayscale hover:grayscale-0 transition-all" />
                                            <div className="text-[8px] mt-1 text-center">{new Date(item.id).toLocaleDateString()}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* BOTTOM DECORATION */}
                    <div className="fixed bottom-4 right-4 text-[10px] opacity-30 text-right">
                        INREALLIFE v1.0.2-BETA<br/>
                        NEO-GEO-ENGINE-RUNNING
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
